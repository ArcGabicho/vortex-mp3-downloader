<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vortex MP3 Downloader</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌀</text></svg>">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">🌀</div>
        <div>
          <h1>Vortex MP3</h1>
          <p class="subtitle">Descarga audio de YouTube al instante</p>
        </div>
      </div>
    </header>

    <main>
      <section class="download-form">
        <form id="downloadForm">
          <div class="input-group">
            <input
              type="url"
              id="urlInput"
              placeholder="Pega una URL de YouTube aquí..."
              required
              autofocus
            >
            <button type="submit" id="submitBtn">
              <span class="btn-text">Descargar</span>
              <span class="btn-loading hidden">
                <svg class="spinner" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4"/>
                </svg>
                Procesando...
              </span>
            </button>
          </div>
          <p class="form-hint">Pega el enlace de cualquier video de YouTube y recibe el audio en MP3.</p>
        </form>
      </section>

      <section class="recent-downloads">
        <div class="section-header">
          <h2>Descargas recientes</h2>
          <button id="refreshBtn" class="btn-icon" title="Actualizar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 4v6h6M23 20v-6h-6"/>
              <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
            </svg>
          </button>
        </div>
        <div id="downloadsList" class="downloads-list">
          <div class="empty-state">
            <p>No hay descargas aún. ¡Pega una URL arriba para empezar!</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Vortex MP3 Downloader &mdash; Proyecto open source</p>
    </footer>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/static/app.js"></script>
</body>
</html>
